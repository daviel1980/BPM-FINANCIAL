<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestione Cashflow💵 v75</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #f4f7f6; --card-bg: #ffffff; --accent: #01696f; --accent-light: #e0f2f1;
      --border: #e2e8f0; --text: #1e293b; --in: #10b981; --out: #ef4444; --save: #3b82f6; --cash: #f59e0b; --varie: #8b5cf6;
    }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; padding: 1rem 0.5rem; }
    .v-stack { display: flex; flex-direction: column; gap: 1rem; max-width: 700px; margin: 0 auto; }
    .card { background: var(--card-bg); border-radius: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 1.25rem; border: 1px solid var(--border); }
    .title { margin: 0; font-size: 1.1rem; color: var(--accent); text-align: center; font-weight: 800; text-transform: uppercase; }
    
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .stat { padding: 1rem; border-radius: 0.75rem; cursor: pointer; position: relative; border: 1px solid transparent; transition: 0.2s; }
    .stat-label { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; opacity: 0.8; margin-bottom: 4px; }
    .stat-value { font-size: 1.1rem; font-weight: 800; }
    
    .bg-banca { background: #f0fdf4; color: #166534; }
    .bg-disp { background: #f5f3ff; color: #5b21b6; }
    .bg-save { background: #eff6ff; color: #1e40af; }
    .bg-cash { background: #fffbeb; color: #92400e; }
    .bg-week { background: #f1f5f9; color: #334155; grid-column: span 2; border: 1px solid #cbd5e1; }
    .bg-varie { background: #faf5ff; color: #6b21a8; border: 2px dashed #d8b4fe; grid-column: span 2; }

    .quick-actions { display: flex; gap: 4px; position: absolute; top: 8px; right: 8px; }
    .btn-small { background: white; border: 1px solid currentColor; font-weight: 700; padding: 2px 4px; font-size: 0.55rem; border-radius: 4px; cursor: pointer; }
    
    #alertBanner { padding: 0.8rem; border-radius: 0.75rem; font-weight: 700; text-align: center; font-size: 0.8rem; margin: 0.5rem 0; }
    .alert-ok { background: #dcfce7; color: #166534; }
    .alert-warn { background: #fee2e2; color: #991b1b; }

    .section-title { margin: 1rem 0 0.5rem; font-size: 0.85rem; font-weight: 700; color: var(--accent); text-transform: uppercase; }
    input, select, button { border-radius: 0.6rem; border: 1px solid var(--border); padding: 0.7rem; font-size: 0.9rem; width: 100%; margin-bottom: 0.5rem; }
    button.primary { background: var(--accent); color: #fff; border: none; font-weight: 700; cursor: pointer; }
    
    .table { width: 100%; border-collapse: collapse; }
    .table td { padding: 0.75rem 0.5rem; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
    .money.in { color: var(--in); font-weight: 700; }
    .money.out { color: var(--out); font-weight: 700; }
    
    .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
    .modal-content { background: white; padding: 1.5rem; border-radius: 1rem; width: 90%; max-height: 80vh; overflow-y: auto; }
    .fissa-item { display: flex; justify-content: space-between; padding: 8px; background: #fff5f5; border-radius: 8px; margin-bottom: 5px; border-left: 4px solid var(--out); font-size: 0.85rem; }
  </style>
</head>
<body>

<div class="v-stack">
  <div class="card"><h1 class="title">Gestione Cashflow💵 v75</h1></div>

  <div class="card">
    <div class="stats">
      <div class="stat bg-banca" onclick="showDetail('banca')">
        <div class="stat-label">HUB BANCA 💳</div>
        <div id="actBal" class="stat-value">0 €</div>
      </div>
      <div class="stat bg-disp" onclick="showDetail('disp')">
        <div class="stat-label">DISPONIBILE 🏁</div>
        <div id="curBal" class="stat-value">0 €</div>
      </div>
      <div class="stat bg-save" onclick="showDetail('save')">
        <div class="quick-actions">
          <button class="btn-small" onclick="event.stopPropagation(); manageFunds('save_in');">➕</button>
          <button class="btn-small" onclick="event.stopPropagation(); manageFunds('save_out');">🔙</button>
        </div>
        <div class="stat-label">RISPARMIO 💎</div>
        <div id="savBal" class="stat-value">0 €</div>
      </div>
      <div class="stat bg-cash" onclick="showDetail('cash')">
        <button class="btn-small" style="position:absolute; top:8px; right:8px;" onclick="event.stopPropagation(); manageFunds('cash_in');">➕</button>
        <div class="stat-label">CONTANTE 💵</div>
        <div id="cashBal" class="stat-value">0 €</div>
      </div>
      <div class="stat bg-week" onclick="showDetail('week')">
        <div class="stat-label">SPESA CUMULATIVA ULTIMI 7 GG 📊</div>
        <div id="weekBal" class="stat-value">0 €</div>
      </div>
      <div class="stat bg-varie" onclick="showDetail('varie')">
        <div class="stat-label">TARGET SVAGO (MAX 500€/MESE) 🛍️</div>
        <div id="varieBal" class="stat-value">0 €</div>
        <div id="varieAdvice" style="font-size: 0.6rem; font-weight: 700; margin-top:5px"></div>
      </div>
    </div>
    <div id="alertBanner"></div>
  </div>

  <div class="card">
    <h2 class="section-title">REGISTRA MOVIMENTO UNICO/SETTIMANALE</h2>
    <form id="movForm">
      <input type="date" id="mDate" required>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <select id="mSource"><option value="banca">💳 Banca</option><option value="contanti">💵 Contanti</option></select>
        <select id="mType"><option value="uscita">Uscita (-)</option><option value="entrata">Entrata (+)</option></select>
      </div>
      <input type="number" id="mAmt" step="0.01" placeholder="Importo €" required>
      <select id="mTag">
          <option value="ordinaria">Spesa Comune / Alimentari</option>
          <option value="svago">🛍️ Svago / Abbigliamento</option>
      </select>
      <input type="text" id="mCat" placeholder="Descrizione (es. Spesa Settimana, Enel...)" required>
      <button type="submit" class="primary">REGISTRA</button>
    </form>
  </div>

  <div class="card">
    <h2 class="section-title">SPESE FISSE DA PAGARE</h2>
    <div id="budList"></div>
  </div>

  <div class="card">
    <h2 class="section-title">STORICO MOVIMENTI</h2>
    <table class="table"><tbody id="rows"></tbody></table>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:1rem">
      <button onclick="exportData()" style="background:#eee">Backup (Salva)</button>
      <button onclick="document.getElementById('importFile').click()" style="background:#eee">Importa (Carica)</button>
    </div>
    <input type="file" id="importFile" style="display:none" onchange="importData(event)">
  </div>
</div>

<div id="detailModal" class="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h3 id="modalTitle">Dettaglio</h3>
    <div id="modalBody" style="font-size: 0.9rem; line-height: 1.4; margin-bottom: 1rem;"></div>
    <button onclick="closeModal()">CHIUDI</button>
  </div>
</div>

<script>
  const fmt = n => new Intl.NumberFormat('it-IT', { style: 'currency', currency: 'EUR' }).format(n);
  const fmtDate = d => d.split('-').reverse().join('/');

  let state = { movs: [], buds: [], sBal: 0, stipendioBase: 3300, alertLimit: 800 };
  let editingId = null;

  function loadData() {
    const saved = localStorage.getItem('bpm_v75');
    if (saved) state = JSON.parse(saved);
    render();
  }
  function saveData() { localStorage.setItem('bpm_v75', JSON.stringify(state)); }

  function getCalculatedData() {
    const today = new Date();
    const todayStr = today.toISOString().slice(0,10);
    const curMonth = todayStr.slice(0,7);
    
    const bancaBal = state.movs.filter(m => m.date <= todayStr && m.source === 'banca').reduce((s, m) => s + (m.type === 'entrata' ? m.amt : -m.amt), 0);
    const cashBal = state.movs.filter(m => m.source === 'contanti' && m.date <= todayStr).reduce((s, m) => s + (m.type === 'entrata' ? m.amt : -m.amt), 0);
    
    // Spese fisse residue
    let fisseRes = 0;
    let fisseMancanti = [];
    state.buds.forEach(f => {
      const pagata = state.movs.some(m => m.date.slice(0,7) === curMonth && m.cat.toLowerCase().includes(f.cat.toLowerCase()));
      if(!pagata) { fisseRes += f.amt; fisseMancanti.push(f); }
    });

    // Svago 500
    const spesoSvago = state.movs.filter(m => m.date.slice(0,7) === curMonth && m.tag === 'svago').reduce((s,m) => s + m.amt, 0);
    const residuoSvago = 500 - spesoSvago;

    // Settimanale
    const weekAgo = new Date(); weekAgo.setDate(today.getDate() - 7);
    const weekAgoStr = weekAgo.toISOString().slice(0,10);
    const spesoSettimana = state.movs.filter(m => m.date > weekAgoStr && m.date <= todayStr && m.type === 'uscita').reduce((s,m) => s + m.amt, 0);

    return { bancaBal, cashBal, avail: bancaBal + state.stipendioBase - fisseRes, residuoSvago, spesoSettimana, fisseMancanti };
  }

  function render() {
    const d = getCalculatedData();
    document.getElementById('actBal').textContent = fmt(d.bancaBal);
    document.getElementById('curBal').textContent = fmt(d.avail);
    document.getElementById('savBal').textContent = fmt(state.sBal);
    document.getElementById('cashBal').textContent = fmt(d.cashBal);
    document.getElementById('weekBal').textContent = fmt(d.spesoSettimana);
    document.getElementById('varieBal').textContent = fmt(d.residuoSvago);

    const advice = document.getElementById('varieAdvice');
    advice.textContent = d.residuoSvago < 50 ? "⚠️ BUDGET LIMITATO" : "✅ Margine svago OK";
    advice.style.color = d.residuoSvago < 50 ? "red" : "#6b21a8";

    const banner = document.getElementById('alertBanner');
    if(d.avail < state.alertLimit) { banner.className = "alert-warn"; banner.textContent = `🚨 SOGLIA SICUREZZA 800€ A RISCHIO: ${fmt(d.avail)}`; }
    else { banner.className = "alert-ok"; banner.textContent = "✅ CUSCINETTO SICUREZZA OK"; }

    document.getElementById('budList').innerHTML = d.fisseMancanti.map(f => `
      <div class="fissa-item"><span>${f.cat}</span><b>${fmt(f.amt)}</b></div>`).join('') || "<div style='color:green;font-size:0.8rem;font-weight:700'>Tutte le spese fisse di questo mese sono pagate!</div>";

    const sorted = [...state.movs].sort((a,b) => new Date(b.date) - new Date(a.date));
    document.getElementById('rows').innerHTML = sorted.slice(0,12).map((m) => `
      <tr>
        <td><small>${fmtDate(m.date)}</small><br><b>${m.cat}</b></td>
        <td style="text-align:right" class="money ${m.type}">${m.type==='entrata'?'+':'-'}${fmt(m.amt)}</td>
        <td style="text-align:right"><button onclick="delM(${state.movs.indexOf(m)})" style="border:none;background:none;cursor:pointer">🗑️</button></td>
      </tr>`).join('');

    saveData();
  }

  function showDetail(t) {
    const d = getCalculatedData();
    let title = "", body = "";
    if(t==='banca') { title = "Hub Banca 💳"; body = "Saldo reale attuale. Rappresenta la liquidità immediata sul tuo conto."; }
    if(t==='disp') { title = "Disponibile 🏁"; body = "Proiezione a fine mese considerando l'arrivo dello stipendio e il pagamento delle fisse mancanti."; }
    if(t==='save') { title = "Risparmio 💎"; body = "Fondo accumulato per vacanze e obiettivi. Questi soldi sono 'fuori' dal saldo Hub."; }
    if(t==='cash') { title = "Contante 💵"; body = "Saldo del denaro fisico che hai nel portafoglio."; }
    if(t==='week') { title = "Spesa Settimanale 📊"; body = `Negli ultimi 7 giorni hai registrato uscite per un totale di ${fmt(d.spesoSettimana)}. Questo dato ti aiuta a monitorare le spese cumulative (alimentari, varie).`; }
    if(t==='varie') { title = "Target Svago 🛍️"; body = `Budget mensile: 500,00€<br>Ancora spendibili: ${fmt(d.residuoSvago)}.`; }
    
    document.getElementById('modalTitle').innerHTML = title;
    document.getElementById('modalBody').innerHTML = body;
    document.getElementById('detailModal').style.display = 'flex';
  }

  function manageFunds(action) {
    let amt = Number(prompt("Importo:")); if(!amt) return;
    const date = new Date().toISOString().slice(0,10);
    if(action==='save_in') { state.sBal += amt; state.movs.push({date, source:'banca', type:'uscita', amt, cat:"💎 Trasferimento Risparmio"}); }
    else if(action==='save_out') { state.sBal -= amt; state.movs.push({date, source:'banca', type:'entrata', amt, cat:"🔙 Revoca Risparmio"}); }
    else if(action==='cash_in') { 
        state.movs.push({ date, source:'banca', type:'uscita', amt, cat:"🏧 Prelievo Contante" });
        state.movs.push({ date, source:'contanti', type:'entrata', amt, cat:"💵 Carico Cassa" });
    }
    render();
  }

  document.getElementById('movForm').onsubmit = e => {
    e.preventDefault();
    state.movs.push({
      date: document.getElementById('mDate').value,
      source: document.getElementById('mSource').value,
      type: document.getElementById('mType').value,
      amt: Number(document.getElementById('mAmt').value),
      tag: document.getElementById('mTag').value,
      cat: document.getElementById('mCat').value
    });
    render(); e.target.reset();
  };

  function delM(i) { if(confirm("Eliminare?")) { state.movs.splice(i,1); render(); } }
  function closeModal() { document.getElementById('detailModal').style.display='none'; }
  function exportData() {
    const a = document.createElement('a'); a.href = 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(state));
    a.download = 'cashflow_v75.json'; a.click();
  }
  function importData(e) {
    const r = new FileReader(); r.onload = x => { state = JSON.parse(x.target.result); render(); };
    r.readAsText(e.target.files[0]);
  }

  loadData();
</script>
</body>
</html>
