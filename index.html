<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cashflow Davide & Antonella v130</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #f1f5f9; --card: #ffffff; --accent: #01696f; --accent-dark: #004d40;
            --border: #e2e8f0; --text: #1e293b; --in: #10b981; --out: #ef4444; --save: #3b82f6; --cash: #f59e0b; --varie: #ec4899; --wa: #25d366;
        }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; padding: 0.5rem; }
        .container { max-width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 0.8rem; }
        
        .banner { display: none; padding: 1rem; border-radius: 0.8rem; font-weight: 800; font-size: 0.8rem; text-align: center; border: 2px solid; animation: pulse 2s infinite; }
        .banner-red { display: block; background: #fee2e2; border-color: #ef4444; color: #991b1b; }
        .banner-yellow { display: block; background: #fef9c3; border-color: #facc15; color: #854d0e; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }

        .header { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: white; padding: 1rem; border-radius: 1rem; text-align: center; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
        .stat-card { background: var(--card); padding: 0.8rem; border-radius: 0.8rem; border: 1px solid var(--border); position: relative; cursor: pointer; }
        .stat-label { font-size: 0.55rem; font-weight: 800; color: #64748b; text-transform: uppercase; }
        .stat-value { font-size: 1rem; font-weight: 900; margin-top: 2px; }
        
        .btn-wa { background: var(--wa); color: white; border: none; padding: 0.8rem; border-radius: 0.8rem; font-weight: 800; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; text-decoration: none; }
        .card { background: var(--card); padding: 1rem; border-radius: 1rem; border: 1px solid var(--border); }
        .section-title { font-size: 0.7rem; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 0.8rem; border-left: 3px solid var(--accent); padding-left: 8px; }

        input, select, button { padding: 0.7rem; border-radius: 0.6rem; border: 1px solid var(--border); width: 100%; box-sizing: border-box; margin-bottom: 0.5rem; font-size: 0.9rem; }
        button.primary { background: var(--accent); color: white; font-weight: 800; border: none; }
        
        .table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .table td { padding: 0.6rem 0.2rem; border-bottom: 1px solid var(--border); }
        .btn-edit { background: none; border: none; cursor: pointer; font-size: 1rem; padding: 0 4px; }
        .edit-mode { background: #f0f9ff; border: 1px solid var(--save); padding: 2px; border-radius: 4px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <div id="alertBanner" class="banner"></div>

    <div class="header">
        <h1 style="margin:0; font-size:0.9rem; text-transform:uppercase;">Cashflow Davide & Antonella</h1>
    </div>

    <div class="stats-grid">
        <div class="stat-card" style="border-left:4px solid var(--in)" onclick="openModal('banca')">
            <span class="stat-label">Saldo Reale 💳</span><div id="val-banca" class="stat-value">0 €</div>
        </div>
        <div class="stat-card" style="border-left:4px solid #8b5cf6" onclick="openModal('gap')">
            <span class="stat-label">Disponibile 🏁</span><div id="val-gap" class="stat-value">0 €</div>
        </div>
        <div class="stat-card" style="border-left:4px solid var(--save)">
            <button class="btn-edit" style="position:absolute; top:5px; right:5px" onclick="manualEdit('save')">✏️</button>
            <span class="stat-label">Risparmio 💎</span><div id="val-save" class="stat-value">0 €</div>
        </div>
        <div class="stat-card" style="border-left:4px solid var(--cash)">
            <button class="btn-edit" style="position:absolute; top:5px; right:5px" onclick="manualEdit('cash')">✏️</button>
            <span class="stat-label">Contante 💵</span><div id="val-cash" class="stat-value">0 €</div>
        </div>
        <div class="stat-card" style="grid-column: span 2; border-left:4px solid var(--varie); background:#fff1f2" onclick="openModal('tempo')">
            <span class="stat-label">Target Tempo Libero (500€) 🛍️</span><div id="val-tempo" class="stat-value">0 €</div>
        </div>
    </div>

    <button class="btn-wa" onclick="sendWhatsApp()">Invia Report ad Antonella 🏖️</button>

    <div class="card"><canvas id="mainChart" height="150"></canvas></div>

    <div class="card">
        <div class="section-title">Spese Fisse Mensili</div>
        <div id="fisseList"></div>
        <button class="primary" onclick="addFissa()" style="margin-top:10px">+ Aggiungi Spesa Fissa</button>
    </div>

    <div class="card">
        <div class="section-title">Nuovo Movimento</div>
        <form id="movForm">
            <input type="date" id="fDate" required>
            <div style="display:flex; gap:5px">
                <select id="fSource"><option value="banca">Banca 💳</option><option value="cash">Cassa 💵</option></select>
                <select id="fType"><option value="uscita">Uscita</option><option value="entrata">Entrata</option></select>
            </div>
            <select id="fTag">
                <option value="ordinaria">Ordinaria</option>
                <option value="stipendio">💰 Stipendio</option>
                <option value="svago">🛍️ Svago/Shopping</option>
            </select>
            <input type="number" id="fAmt" placeholder="Importo €" step="0.01" required>
            <input type="text" id="fDesc" placeholder="Descrizione" required>
            <button type="submit" class="primary">REGISTRA</button>
        </form>
    </div>

    <div class="card">
        <div class="section-title">Storico Movimenti</div>
        <table class="table"><tbody id="historyTable"></tbody></table>
        <div style="display:flex; gap:10px; margin-top:15px">
            <button onclick="exportData()" style="font-size:0.7rem">Backup</button>
            <button onclick="document.getElementById('imp').click()" style="font-size:0.7rem">Importa</button>
            <input type="file" id="imp" style="display:none" onchange="importData(event)">
        </div>
    </div>
</div>

<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;" onclick="this.style.display='none'">
    <div class="card" style="width:80%; max-height:70%; overflow-y:auto;" onclick="event.stopPropagation()">
        <h3 id="mTitle" style="color:var(--accent); margin-top:0"></h3>
        <div id="mBody" style="font-size:0.9rem; line-height:1.6"></div>
        <button class="primary" style="margin-top:15px" onclick="document.getElementById('modal').style.display='none'">Chiudi</button>
    </div>
</div>

<script>
    const fmt = n => new Intl.NumberFormat('it-IT', { style: 'currency', currency: 'EUR' }).format(n || 0);
    let state = { movs: [], fisse: [], risparmio: 0, cashMan: null };
    let chart;

    function init() {
        const data = localStorage.getItem('cashflow_v130');
        if (data) state = JSON.parse(data);
        document.getElementById('fDate').valueAsDate = new Date();
        render();
    }

    function calculate() {
        const today = new Date().toISOString().split('T')[0];
        const curMonth = today.slice(0, 7);
        
        // 1. Saldo Reale (tutto quello <= oggi)
        const bancaReale = state.movs
            .filter(m => m.source === 'banca' && m.date <= today)
            .reduce((s, m) => s + (m.type === 'entrata' ? Number(m.amt) : -Number(m.amt)), 0);

        // 2. Contante
        const cassaReale = (state.cashMan !== null) ? state.cashMan : state.movs
            .filter(m => m.source === 'cash' && m.date <= today)
            .reduce((s, m) => s + (m.type === 'entrata' ? Number(m.amt) : -Number(m.amt)), 0);

        // 3. Tempo Libero (speso nel mese)
        const spesoTempo = state.movs
            .filter(m => m.date.slice(0,7) === curMonth && m.tag === 'svago')
            .reduce((s, m) => s + Number(m.amt), 0);

        // 4. Proiezione Fine Mese (GAP)
        let gapDettaglio = [];
        let runningGap = bancaReale;
        const lastDay = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).getDate();
        
        for(let d = new Date().getDate(); d <= lastDay; d++) {
            const dStr = curMonth + "-" + String(d).padStart(2, '0');
            // Stipendi ipotetici
            if (d === 15 && !state.movs.some(m => m.date.slice(0,7) === curMonth && m.date.endsWith('-15') && m.tag === 'stipendio')) {
                runningGap += 1650; gapDettaglio.push("Stipendio 15: +1.650€");
            }
            if (d === lastDay && !state.movs.some(m => m.date.slice(0,7) === curMonth && Number(m.date.split('-')[2]) > 27 && m.tag === 'stipendio')) {
                runningGap += 1650; gapDettaglio.push("Stipendio 30: +1.650€");
            }
            // Spese fisse mancanti
            state.fisse.forEach(f => {
                if(Number(f.day) === d && !state.movs.some(m => m.date.slice(0,7) === curMonth && m.desc.toLowerCase().includes(f.name.toLowerCase()))) {
                    runningGap -= Number(f.amt); gapDettaglio.push(`${f.name}: -${f.amt}€`);
                }
            });
            // Movimenti futuri già inseriti
            state.movs.filter(m => m.date === dStr && m.date > today && m.source === 'banca').forEach(m => {
                const val = m.type === 'entrata' ? Number(m.amt) : -Number(m.amt);
                runningGap += val; gapDettaglio.push(`${m.desc}: ${val > 0 ? '+':''}${val}€`);
            });
        }

        return { bancaReale, cassaReale, gap: runningGap, gapDettaglio, spesoTempo, residuoTempo: 500 - spesoTempo };
    }

    function render() {
        const d = calculate();
        
        // Banner
        const b = document.getElementById('alertBanner');
        if (d.gap < 800) { b.className = "banner banner-red"; b.innerHTML = `🚨 ATTENZIONE: Saldo previsto sotto soglia sicurezza (${fmt(d.gap)})`; }
        else if (new Date().getDay() === 4) { b.className = "banner banner-yellow"; b.innerHTML = "📅 Giovedì: Check con Antonella!"; }
        else { b.className = "banner"; }

        document.getElementById('val-banca').innerText = fmt(d.bancaReale);
        document.getElementById('val-gap').innerText = fmt(d.gap);
        document.getElementById('val-save').innerText = fmt(state.risparmio);
        document.getElementById('val-cash').innerText = fmt(d.cassaReale);
        document.getElementById('val-tempo').innerText = fmt(d.residuoTempo);

        // Liste
        document.getElementById('fisseList').innerHTML = state.fisse.map((f, i) => `
            <div style="display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:5px">
                <span>${f.name} (gg ${f.day})</span>
                <span><b>${fmt(f.amt)}</b> <button class="btn-edit" onclick="delFissa(${i})">🗑️</button></span>
            </div>`).join('');

        document.getElementById('historyTable').innerHTML = state.movs.slice().reverse().slice(0, 10).map((m, i) => {
            const realIdx = state.movs.length - 1 - i;
            return `<tr>
                <td><small>${m.date.split('-')[2]}/${m.date.split('-')[1]}</small><br><b>${m.desc}</b></td>
                <td style="text-align:right; color:${m.type==='entrata'?'green':'red'}"><b>${m.type==='entrata'?'+':'-'}${fmt(m.amt)}</b></td>
                <td style="text-align:right">
                    <button class="btn-edit" onclick="editMov(${realIdx})">✏️</button>
                    <button class="btn-edit" onclick="delMov(${realIdx})">🗑️</button>
                </td>
            </tr>`;
        }).join('');

        updateChart(d.gap);
        localStorage.setItem('cashflow_v130', JSON.stringify(state));
    }

    function updateChart(gap) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Oggi', 'Fine Mese'],
                datasets: [{ label: 'Andamento', data: [calculate().bancaReale, gap], borderColor: '#01696f', tension: 0.3 },
                           { label: 'Soglia', data: [800, 800], borderColor: 'red', borderDash: [5,5], pointRadius: 0 }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });
    }

    // Azioni
    document.getElementById('movForm').onsubmit = e => {
        e.preventDefault();
        state.movs.push({
            date: document.getElementById('fDate').value,
            source: document.getElementById('fSource').value,
            type: document.getElementById('fType').value,
            tag: document.getElementById('fTag').value,
            amt: Number(document.getElementById('fAmt').value),
            desc: document.getElementById('fDesc').value
        });
        render(); e.target.reset(); document.getElementById('fDate').valueAsDate = new Date();
    };

    function addFissa() {
        const name = prompt("Nome spesa:");
        const amt = prompt("Importo €:");
        const day = prompt("Giorno del mese (1-31):");
        if(name && amt && day) { state.fisse.push({name, amt, day}); render(); }
    }

    function manualEdit(type) {
        const n = prompt("Nuovo valore €:");
        if (n !== null) {
            if (type === 'save') state.risparmio = Number(n);
            else state.cashMan = Number(n);
            render();
        }
    }

    function editMov(i) {
        const m = state.movs[i];
        const nDesc = prompt("Modifica nome:", m.desc);
        const nAmt = prompt("Modifica importo:", m.amt);
        if (nDesc && nAmt) { m.desc = nDesc; m.amt = Number(nAmt); render(); }
    }

    function openModal(type) {
        const d = calculate();
        const m = document.getElementById('modal');
        const t = document.getElementById('mTitle');
        const b = document.getElementById('mBody');
        if(type==='gap') { t.innerText = "Dettaglio Proiezione"; b.innerHTML = d.gapDettaglio.join('<br>'); }
        else if(type==='tempo') { t.innerText = "Target Tempo Libero"; b.innerHTML = `Budget: 500€<br>Speso: ${fmt(d.spesoTempo)}<br><b>Residuo: ${fmt(d.residuoTempo)}</b>`; }
        m.style.display = 'flex';
    }

    function sendWhatsApp() {
        const d = calculate();
        const msg = `🏖️ REPORT CASHFLOW\n\n💳 Reale: ${fmt(d.bancaReale)}\n🏁 Previsto: ${fmt(d.gap)}\n💎 Risparmio: ${fmt(state.risparmio)}\n🛍️ Tempo Libero: ${fmt(d.residuoTempo)}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
    }

    function delMov(i) { if(confirm("Eliminare?")) { state.movs.splice(i, 1); render(); } }
    function delFissa(i) { if(confirm("Eliminare?")) { state.fisse.splice(i, 1); render(); } }
    function exportData() { const blob = new Blob([JSON.stringify(state)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'cashflow.json'; a.click(); }
    function importData(e) { const r = new FileReader(); r.onload = x => { state = JSON.parse(x.target.result); render(); }; r.readAsText(e.target.files[0]); }

    init();
</script>
</body>
</html>
