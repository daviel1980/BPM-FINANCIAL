<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="CashflowVacanze">
  <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/96/beach-umbrella.png">
  
  <title>Gestione Cashflow & Target Vacanze</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #f1f5f9; --card: #ffffff; --accent: #01696f; --accent-dark: #004d40;
      --border: #e2e8f0; --text: #1e293b; --in: #10b981; --out: #ef4444; --save: #3b82f6; --cash: #f59e0b; --varie: #ec4899;
    }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; padding: 0.5rem; }
    .container { max-width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 0.8rem; }
    
    #thursdayBanner { display: none; background: #fef9c3; border: 2px solid #facc15; color: #854d0e; padding: 0.8rem; border-radius: 0.75rem; font-weight: 800; font-size: 0.75rem; text-align: center; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }

    .header-card { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: white; padding: 1.2rem; border-radius: 1.2rem; text-align: center; box-shadow: 0 4px 15px rgba(1, 105, 111, 0.2); }
    .logo-svg { width: 45px; height: 45px; margin-bottom: 5px; }
    .title { margin: 0; font-size: 0.85rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
    .btn-whatsapp { background: #25d366; color: white; border: none; padding: 8px 15px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; margin-top: 12px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }

    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.6rem; }
    .stat-card { background: var(--card); padding: 1rem; border-radius: 0.9rem; border: 1px solid var(--border); cursor: pointer; position: relative; }
    .stat-label { font-size: 0.55rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 4px; display: block; }
    .stat-value { font-size: 1.1rem; font-weight: 900; }
    
    .border-banca { border-left: 5px solid var(--in); }
    .border-disp { border-left: 5px solid #8b5cf6; background: #f5f3ff; }
    .border-save { border-left: 5px solid var(--save); }
    .border-cash { border-left: 5px solid var(--cash); }
    .border-tempo { border-left: 5px solid var(--varie); grid-column: span 2; background: #fff1f2; }

    .quick-actions { display: flex; gap: 4px; position: absolute; top: 8px; right: 8px; }
    .btn-small { background: #fff; border: 1px solid var(--border); padding: 3px 7px; font-size: 0.65rem; border-radius: 5px; cursor: pointer; font-weight: 800; }
    
    .card { background: var(--card); padding: 1.2rem; border-radius: 1.1rem; border: 1px solid var(--border); }
    .section-title { margin: 0 0 1rem 0; font-size: 0.75rem; font-weight: 800; color: var(--accent); text-transform: uppercase; border-left: 4px solid var(--accent); padding-left: 10px; }

    .gauge-wrapper { display: flex; flex-direction: column; align-items: center; }
    .gauge-container { width: 150px; height: 85px; position: relative; }
    #gaugeLabel { font-size: 1rem; font-weight: 900; color: var(--accent); margin-top: -10px; }

    input, select, button { border-radius: 0.7rem; border: 1px solid var(--border); padding: 0.8rem; font-size: 0.95rem; width: 100%; margin-bottom: 0.6rem; box-sizing: border-box; }
    button.primary { background: var(--accent); color: white; border: none; font-weight: 800; cursor: pointer; }
    
    .table { width: 100%; border-collapse: collapse; }
    .table td { padding: 0.8rem 0.2rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    .money.in { color: var(--in); font-weight: 800; }
    .money.out { color: var(--out); font-weight: 800; }

    .modal { display: none; position: fixed; z-index: 9999; left:0; top:0; width:100%; height:100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; backdrop-filter: blur(5px); }
    .modal-content { background: white; padding: 1.5rem; border-radius: 1.5rem; width: 88%; max-width: 450px; max-height: 80vh; overflow-y: auto; }
    .detail-row { display: flex; justify-content: space-between; font-size: 0.85rem; padding: 8px 0; border-bottom: 1px dashed #eee; }
    .btn-icon { background: none; border: none; cursor: pointer; font-size: 1.1rem; padding: 4px; }
    .edit-input { font-size: 0.8rem; padding: 5px; border: 1.5px solid var(--save); border-radius: 6px; width: 100%; margin: 2px 0; box-sizing: border-box; }
  </style>
</head>
<body>

<div class="container">
    <div id="thursdayBanner">📅 Aggiorna il saldo reale insieme a tua moglie! 🏖️</div>

    <div class="header-card">
        <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="45" fill="white" fill-opacity="0.2"/>
            <path d="M30 65L45 45L60 55L75 30" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M20 75H80" stroke="white" stroke-width="4" stroke-linecap="round"/>
        </svg>
        <h1 class="title">Gestione Cashflow & Target Vacanze</h1>
        <button onclick="sendWhatsAppReport()" class="btn-whatsapp">📲 INVIA REPORT WHATSAPP</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card border-banca" onclick="showDetail('banca')"><span class="stat-label">SALDO REALE 💳</span><div id="actBal" class="stat-value">0 €</div></div>
        <div class="stat-card border-disp" onclick="showDetail('gap')"><span class="stat-label">DISPONIBILE (GAP) 🏁</span><div id="curBal" class="stat-value">0 €</div></div>
        <div class="stat-card border-save" onclick="showDetail('risparmio')">
            <div class="quick-actions"><button class="btn-small" onclick="event.stopPropagation(); editManualBalance('save')">✏️</button><button class="btn-small" onclick="event.stopPropagation(); manageFunds('save_in')">➕</button></div>
            <span class="stat-label">RISPARMIO 💎</span><div id="savBal" class="stat-value">0 €</div>
        </div>
        <div class="stat-card border-cash" onclick="showDetail('cassa')">
            <div class="quick-actions"><button class="btn-small" onclick="event.stopPropagation(); editManualBalance('cash')">✏️</button><button class="btn-small" onclick="event.stopPropagation(); manageFunds('cash_in')">➕</button></div>
            <span class="stat-label">CONTANTE 💵</span><div id="cashBal" class="stat-value">0 €</div>
        </div>
        <div class="stat-card border-tempo" onclick="showDetail('tempo')">
            <span class="stat-label">TARGET TEMPO LIBERO 🛍️</span><div id="tempoBal" class="stat-value">0 €</div>
        </div>
    </div>

    <div class="card">
        <h2 class="section-title">Efficienza Vacanze 🏖️</h2>
        <div class="gauge-wrapper">
            <div class="gauge-container"><canvas id="gaugeChart"></canvas></div>
            <div id="gaugeLabel">0%</div>
        </div>
    </div>

    <div class="card"><h2 class="section-title">Andamento Mensile</h2><canvas id="balanceChart" height="150"></canvas></div>

    <div class="card">
        <h2 class="section-title">Spese Fisse</h2>
        <form id="budForm" style="display:flex; gap:5px; margin-bottom:10px">
            <input type="text" id="bCat" placeholder="Nome" required style="flex:2"><input type="number" id="bAmt" placeholder="€" required style="flex:1"><input type="number" id="bDay" placeholder="GG" required min="1" max="31" style="flex:0.6"><button type="submit" style="flex:0.6; background:var(--accent); color:white; border:none; border-radius:8px">+</button>
        </form>
        <div id="budList"></div>
    </div>

    <div class="card">
        <h2 class="section-title">Nuova Registrazione</h2>
        <form id="movForm">
            <input type="date" id="mDate" required>
            <div style="display:flex; gap:8px">
                <select id="mSource"><option value="banca">💳 Banca</option><option value="contanti">💵 Cassa</option></select>
                <select id="mType"><option value="uscita">Uscita</option><option value="entrata">Entrata</option></select>
            </div>
            <select id="mTag">
                <option value="ordinaria">Ordinaria</option>
                <option value="stipendio">💰 Stipendio</option>
                <option value="inps">🏛️ INPS</option>
                <option value="svago">🛍️ Svago</option>
            </select>
            <input type="number" id="mAmt" step="0.01" placeholder="Importo €" required>
            <input type="text" id="mCat" placeholder="Descrizione" required>
            <button type="submit" class="primary">SALVA</button>
        </form>
    </div>

    <div class="card">
        <h2 class="section-title">Storico</h2>
        <input type="text" id="searchInput" placeholder="Cerca..." onkeyup="render()">
        <table class="table"><tbody id="rows"></tbody></table>
        <div style="display:flex; gap:8px; margin-top:10px; flex-wrap: wrap;">
            <button onclick="exportData()" style="background:#eee; font-size:0.7rem; flex:1">BACKUP</button>
            <button onclick="document.getElementById('importFile').click()" style="background:#eee; font-size:0.7rem; flex:1">IMPORTA</button>
            <button onclick="clearHistory()" style="background:var(--out); color:white; font-size:0.7rem; flex:2; border:none;">🗑️ CANCELLA TUTTO</button>
        </div>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
    </div>
</div>

<div id="detailModal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="modalTitle" style="color:var(--accent); margin-top:0;"></h3>
        <div id="modalBody"></div>
        <button onclick="closeModal()" class="primary" style="margin-top:1.5rem;">CHIUDI</button>
    </div>
</div>

<script>
    const fmt = n => new Intl.NumberFormat('it-IT', { style: 'currency', currency: 'EUR' }).format(isNaN(n) ? 0 : n);
    const CONFIG = { stip15: 1650, stip30: 1650, warningLevel: 800 };

    let state = { movs: [], buds: [], sBal: 0, cashManual: null, lastCashSyncDate: null };
    let editingId = null; let editingBudId = null; let chart; let gaugeChart;

    function loadData() {
        const saved = localStorage.getItem('cashflow_master_data');
        if (saved) state = JSON.parse(saved);
        document.getElementById('mDate').valueAsDate = new Date();
        if(new Date().getDay() === 4) document.getElementById('thursdayBanner').style.display = 'block';
        render();
    }
    function saveData() { localStorage.setItem('cashflow_master_data', JSON.stringify(state)); }

    function clearHistory() {
        if(confirm("⚠️ Sei sicuro? Questo cancellerà permanentemente tutto lo storico dei movimenti!")) {
            state.movs = [];
            state.cashManual = null;
            state.lastCashSyncDate = null;
            render();
        }
    }

    function delM(i) {
        if(confirm("Eliminare questa operazione?")) {
            state.movs.splice(i, 1);
            render();
        }
    }

    function getCalculatedData() {
        const now = new Date();
        const todayStr = now.toISOString().split('T')[0];
        const curMonth = todayStr.slice(0, 7);
        const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        
        const bancaBal = state.movs
            .filter(m => m.source === 'banca' && m.date <= todayStr)
            .reduce((s, m) => s + (m.type === 'entrata' ? Number(m.amt) : -Number(m.amt)), 0);
        
        let cashBal = 0;
        if (state.cashManual !== null) {
            cashBal = state.cashManual;
            state.movs.filter(m => m.source === 'contanti' && m.date > state.lastCashSyncDate && m.date <= todayStr).forEach(m => {
                cashBal += (m.type === 'entrata' ? Number(m.amt) : -Number(m.amt));
            });
        } else {
            cashBal = state.movs.filter(m => m.source === 'contanti' && m.date <= todayStr).reduce((s, m) => s + (m.type === 'entrata' ? Number(m.amt) : -Number(m.amt)), 0);
        }
        
        const tempoMovs = state.movs.filter(m => m.date.slice(0,7) === curMonth && (m.tag === 'svago' || m.cat.toLowerCase().includes('svago')));
        const spesoTempo = tempoMovs.reduce((s, m) => s + Number(m.amt), 0);

        let runningBalance = bancaBal; let futureDetails = []; let dailyProjection = [];
        for (let d = now.getDate(); d <= lastDay; d++) {
            const dStr = curMonth + "-" + String(d).padStart(2, '0');
            state.movs.filter(m => m.date === dStr && m.date > todayStr && m.source === 'banca').forEach(m => {
                const val = (m.type === 'entrata' ? Number(m.amt) : -Number(m.amt));
                runningBalance += val; futureDetails.push({ cat: m.cat, amt: val });
            });
            if (d === 15 && !state.movs.some(m => m.date.slice(0,7) === curMonth && m.date.includes('-15') && m.tag === 'stipendio')) { 
                runningBalance += CONFIG.stip15; futureDetails.push({ cat: "Stipendio 15", amt: CONFIG.stip15 });
            }
            if (d === lastDay && !state.movs.some(m => m.date.slice(0,7) === curMonth && parseInt(m.date.slice(-2)) >= 28 && m.tag === 'stipendio')) { 
                runningBalance += CONFIG.stip30; futureDetails.push({ cat: "Stipendio 30", amt: CONFIG.stip30 });
            }
            state.buds.forEach(f => { 
                if (parseInt(f.day) === d && !state.movs.some(m => m.date.slice(0,7) === curMonth && m.cat.toLowerCase().includes(f.cat.toLowerCase()))) {
                    runningBalance -= Number(f.amt); futureDetails.push({ cat: f.cat, amt: -Number(f.amt) });
                }
            });
            dailyProjection.push({ day: d, balance: runningBalance });
        }
        return { bancaBal, cashBal, avail: runningBalance, futureDetails, dailyProjection, residuoTempo: Math.max(0, 500 - spesoTempo), spesoTempo, tempoMovs };
    }

    function render() {
        const d = getCalculatedData();
        const q = (document.getElementById('searchInput').value || "").toLowerCase();
        document.getElementById('actBal').textContent = fmt(d.bancaBal);
        document.getElementById('curBal').textContent = fmt(d.avail);
        document.getElementById('savBal').textContent = fmt(state.sBal);
        document.getElementById('cashBal').textContent = fmt(d.cashBal);
        document.getElementById('tempoBal').textContent = fmt(d.residuoTempo);
        
        const efficiency = d.avail > 1000 ? 100 : (d.avail/1000)*100;
        updateGauge(efficiency > 0 ? efficiency : 0);

        document.getElementById('budList').innerHTML = state.buds.map((f, i) => {
            const isE = editingBudId === i;
            return `<div class="detail-row"><span>${isE ? `<input id="eb-cat-${i}" class="edit-input" value="${f.cat}">` : f.cat}</span><span>${isE ? `<input type="number" id="eb-amt-${i}" class="edit-input" value="${f.amt}">` : fmt(f.amt)} <button onclick="${isE ? `saveBud(${i})` : `toggleEditBud(${i})`}">${isE?'💾':'✏️'}</button><button onclick="delB(${i})">🗑️</button></span></div>`;
        }).join('');

        const filt = state.movs.map((m, originalIdx) => ({...m, originalIdx}))
                         .filter(m => m.cat.toLowerCase().includes(q))
                         .sort((a,b) => new Date(b.date) - new Date(a.date));

        document.getElementById('rows').innerHTML = filt.slice(0,20).map((m) => {
            const idx = m.originalIdx; const isE = editingId === idx;
            return `<tr><td>${isE ? `<input type="date" id="ed-${idx}" value="${m.date}"><br><input id="ec-${idx}" value="${m.cat}">` : `<b>${m.cat}</b><br><small>${m.date} (${m.source})</small>`}</td><td class="${m.type}">${isE ? `<input type="number" id="ea-${idx}" value="${m.amt}">` : (m.type==='entrata'?'+':'-')+fmt(m.amt)}</td><td><button onclick="${isE ? `saveM(${idx})` : `toggleEditM(${idx})`}">${isE?'💾':'✏️'}</button>${!isE ? `<button onclick="delM(${idx})">🗑️</button>` : ''}</td></tr>`;
        }).join('');
        updateChart(d.dailyProjection); saveData();
    }

    function manageFunds(action) {
        let amt = Number(prompt("Importo €:")); if(!amt) return;
        const dStr = new Date().toISOString().split('T')[0];
        if(action==='save_in') {
            state.sBal += amt;
            state.movs.push({date:dStr, source:'banca', type:'uscita', amt, cat:"💎 Risparmio", tag:"ordinaria"});
        } else if(action==='cash_in') {
            state.movs.push({date:dStr, source:'banca', type:'uscita', amt, cat:"🏧 Prelievo", tag:"ordinaria"});
            state.movs.push({date:dStr, source:'contanti', type:'entrata', amt, cat:"💵 Carico Cassa", tag:"ordinaria"});
        }
        render();
    }

    function editManualBalance(type) {
        if(type==='save') {
            const n = prompt("Risparmio attuale:", state.sBal);
            if(n !== null) state.sBal = Number(n);
        } else {
            const n = prompt("Contante esatto nel portafoglio:", 0);
            if(n !== null) {
                state.cashManual = Number(n);
                state.lastCashSyncDate = new Date().toISOString().split('T')[0];
            }
        }
        render();
    }

    function sendWhatsAppReport() {
        const d = getCalculatedData();
        const msg = encodeURIComponent(`📊 REPORT ${new Date().toLocaleDateString()}\n💳 Saldo: ${fmt(d.bancaBal)}\n🏁 Gap: ${fmt(d.avail)}\n💎 Risparmio: ${fmt(state.sBal)}\n💵 Cassa: ${fmt(d.cashBal)}\n🛍️ Svago: ${fmt(d.residuoTempo)}`);
        window.open(`https://wa.me/?text=${msg}`, '_blank');
    }

    function updateGauge(val) {
        const ctx = document.getElementById('gaugeChart').getContext('2d'); if(gaugeChart) gaugeChart.destroy();
        document.getElementById('gaugeLabel').textContent = `${Math.round(val)}%`;
        gaugeChart = new Chart(ctx, { type: 'doughnut', data: { datasets: [{ data: [val, 100 - val], backgroundColor: ['#10b981', '#e2e8f0'], circumference: 180, rotation: 270, cutout: '80%' }] }, options: { plugins: { legend: { display: false } } } });
    }
    function updateChart(projection) {
        const ctx = document.getElementById('balanceChart').getContext('2d'); if(chart) chart.destroy();
        chart = new Chart(ctx, { type: 'line', data: { labels: projection.map(p => p.day), datasets: [{ data: projection.map(p => p.balance), borderColor: '#01696f', tension: 0.3 }, { data: Array(projection.length).fill(CONFIG.warningLevel), borderColor: '#ef4444', borderDash: [5, 5], pointRadius: 0 }] }, options: { plugins: { legend: { display: false } } } });
    }
    function showDetail(type) {
        const d = getCalculatedData(); let t = "", b = "";
        if(type==='gap') { t="Proiezione Fine Mese"; b = d.futureDetails.map(v => `<div class="detail-row"><span>${v.cat}</span><b>${fmt(v.amt)}</b></div>`).join(''); }
        if(type==='tempo') { t="Spese Svago"; b = d.tempoMovs.map(m => `<div class="detail-row"><span>${m.cat}</span><b>${fmt(m.amt)}</b></div>`).join(''); }
        document.getElementById('modalTitle').innerText = t; document.getElementById('modalBody').innerHTML = b; document.getElementById('detailModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('detailModal').style.display = 'none'; }
    function delB(i) { state.buds.splice(i,1); render(); }
    function toggleEditBud(i) { editingBudId = i; render(); }
    function saveBud(i) { state.buds[i].cat = document.getElementById(`eb-cat-${i}`).value; state.buds[i].amt = Number(document.getElementById(`eb-amt-${i}`).value); editingBudId = null; render(); }
    function toggleEditM(i) { editingId = i; render(); }
    function saveM(i) { state.movs[i].date = document.getElementById(`ed-${i}`).value; state.movs[i].cat = document.getElementById(`ec-${i}`).value; state.movs[i].amt = Number(document.getElementById(`ea-${i}`).value); editingId = null; render(); }

    document.getElementById('movForm').onsubmit = e => {
        e.preventDefault();
        state.movs.push({
            date: document.getElementById('mDate').value,
            source: document.getElementById('mSource').value,
            type: document.getElementById('mType').value,
            tag: document.getElementById('mTag').value,
            amt: Number(document.getElementById('mAmt').value),
            cat: document.getElementById('mCat').value
        });
        render(); e.target.reset(); document.getElementById('mDate').valueAsDate = new Date();
    };
    document.getElementById('budForm').onsubmit = e => {
        e.preventDefault();
        state.buds.push({ cat: document.getElementById('bCat').value, amt: Number(document.getElementById('bAmt').value), day: document.getElementById('bDay').value });
        render(); e.target.reset();
    };
    function exportData() { const a = document.createElement('a'); a.href = 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(state)); a.download = 'backup.json'; a.click(); }
    function importData(e) { const r = new FileReader(); r.onload = x => { state = JSON.parse(x.target.result); render(); }; r.readAsText(e.target.files[0]); }
    
    loadData();
</script>
</body>
</html>
