<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Executive Cashflow v81 - Test 1500€</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #f8fafc; --card: #ffffff; --accent: #01696f; --accent-dark: #004d40;
      --border: #e2e8f0; --text: #1e293b; --in: #10b981; --out: #ef4444; --save: #3b82f6; --cash: #f59e0b; --varie: #8b5cf6;
    }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; padding: 0.5rem; }
    .container { max-width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 0.8rem; }
    .header-card { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: white; padding: 1rem; border-radius: 1rem; text-align: center; }
    .title { margin: 0; font-size: 0.9rem; font-weight: 800; text-transform: uppercase; }
    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.6rem; }
    .stat-card { background: var(--card); padding: 0.9rem; border-radius: 0.75rem; border: 1px solid var(--border); cursor: pointer; position: relative; }
    .stat-label { font-size: 0.55rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 3px; display: block; }
    .stat-value { font-size: 1rem; font-weight: 800; }
    .full-width { grid-column: span 2; }
    .border-banca { border-left: 4px solid var(--in); }
    .border-disp { border-left: 4px solid var(--varie); }
    .border-save { border-left: 4px solid var(--save); }
    .border-cash { border-left: 4px solid var(--cash); background: #fffbeb; }
    .card { background: var(--card); padding: 1rem; border-radius: 1rem; border: 1px solid var(--border); }
    .section-title { margin: 0 0 0.8rem 0; font-size: 0.8rem; font-weight: 800; color: var(--accent); text-transform: uppercase; border-left: 3px solid var(--accent); padding-left: 6px; }
    input, select, button { border-radius: 0.5rem; border: 1px solid var(--border); padding: 0.6rem; font-size: 0.85rem; width: 100%; margin-bottom: 0.4rem; }
    button.primary { background: var(--accent); color: white; border: none; font-weight: 800; cursor: pointer; }
    .table { width: 100%; border-collapse: collapse; }
    .table td { padding: 0.6rem 0.2rem; border-bottom: 1px solid var(--border); font-size: 0.75rem; }
    .money.in { color: var(--in); font-weight: 700; }
    .money.out { color: var(--out); font-weight: 700; }
    .modal { display: none; position: fixed; z-index: 1000; left:0; top:0; width:100%; height:100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
    .modal-content { background: white; padding: 1.2rem; border-radius: 1rem; width: 90%; max-height: 85vh; overflow-y: auto; }
  </style>
</head>
<body>

<div class="container">
  <div class="header-card"><h1 class="title">Executive Cashflow v81</h1></div>

  <div class="stats-grid">
    <div class="stat-card border-banca" onclick="showDetail('banca')"><span class="stat-label">SALDO REALE 💳</span><div id="actBal" class="stat-value">0 €</div></div>
    <div class="stat-card border-disp" onclick="showDetail('disp')"><span class="stat-label">DISPONIBILE 🏁</span><div id="curBal" class="stat-value">0 €</div></div>
    <div class="stat-card border-save" onclick="showDetail('save')"><span class="stat-label">RISPARMIO 💎</span><div id="savBal" class="stat-value">0 €</div></div>
    <div class="stat-card border-cash" onclick="showDetail('cash')"><span class="stat-label">CONTANTE 💵</span><div id="cashBal" class="stat-value">0 €</div></div>
  </div>

  <div class="card">
    <h2 class="section-title">Test Inserimento (es. Regalo 1500)</h2>
    <form id="movForm">
      <input type="date" id="mDate" required>
      <select id="mSource"><option value="banca">💳 Banca</option><option value="contanti">💵 Cassa</option></select>
      <select id="mType"><option value="entrata">Entrata (+)</option><option value="uscita">Uscita (-)</option></select>
      <input type="number" id="mAmt" step="0.01" placeholder="Importo €" required>
      <input type="text" id="mCat" placeholder="Descrizione (es. Regalo)" required>
      <button type="submit" class="primary">REGISTRA E VERIFICA</button>
    </form>
  </div>

  <div class="card">
    <h2 class="section-title">Storico (Ultimi 20 movimenti)</h2>
    <table class="table"><tbody id="rows"></tbody></table>
    <div style="display:flex; gap:5px; margin-top:1rem">
      <button onclick="exportData()" style="background:#eee; font-size:0.7rem; font-weight:700">BACKUP DATI</button>
      <button onclick="document.getElementById('importFile').click()" style="background:#eee; font-size:0.7rem; font-weight:700">IMPORTA</button>
    </div>
    <input type="file" id="importFile" style="display:none" onchange="importData(event)">
  </div>
</div>

<script>
  const fmt = n => new Intl.NumberFormat('it-IT', { style: 'currency', currency: 'EUR' }).format(n);
  let state = { movs: [], buds: [], sBal: 0, stipendioBase: 3300, alertLimit: 800 };

  function render() {
    const todayStr = new Date().toISOString().slice(0,10);
    const bancaBal = state.movs.filter(m => m.date <= todayStr && m.source === 'banca').reduce((s, m) => s + (m.type === 'entrata' ? m.amt : -m.amt), 0);
    const cashBal = state.movs.filter(m => m.source === 'contanti' && m.date <= todayStr).reduce((s, m) => s + (m.type === 'entrata' ? m.amt : -m.amt), 0);
    
    document.getElementById('actBal').textContent = fmt(bancaBal);
    document.getElementById('savBal').textContent = fmt(state.sBal);
    document.getElementById('cashBal').textContent = fmt(cashBal);

    const sorted = [...state.movs].sort((a,b) => new Date(b.date) - new Date(a.date));
    document.getElementById('rows').innerHTML = sorted.slice(0,20).map((m) => `
      <tr>
        <td><small>${m.date}</small><br><b>${m.cat}</b></td>
        <td style="text-align:right" class="money ${m.type}">${m.type==='entrata'?'+':'-'}${fmt(m.amt)}</td>
      </tr>`).join('');
    
    localStorage.setItem('bpm_v81', JSON.stringify(state));
  }

  document.getElementById('movForm').onsubmit = e => {
    e.preventDefault();
    const newMov = {
      date: document.getElementById('mDate').value,
      source: document.getElementById('mSource').value,
      type: document.getElementById('mType').value,
      amt: Number(document.getElementById('mAmt').value),
      cat: document.getElementById('mCat').value
    };
    state.movs.push(newMov);
    render();
    alert("Movimento registrato con successo! Ora è visibile nello storico.");
    e.target.reset();
  };

  function exportData() {
    const a = document.createElement('a'); a.href = 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(state));
    a.download = 'cashflow_v81.json'; a.click();
  }
  function importData(e) {
    const r = new FileReader(); r.onload = x => { state = JSON.parse(x.target.result); render(); };
    r.readAsText(e.target.files[0]);
  }

  const saved = localStorage.getItem('bpm_v81');
  if (saved) state = JSON.parse(saved);
  render();
</script>
</body>
</html>
