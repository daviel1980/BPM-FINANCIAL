<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestione Cashflow💵: Risparmi per vacanze e tempo libero</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #f8fafc; --card-bg: #ffffff; --accent: #01696f; --accent-light: #e0f2f1;
      --border: #e2e8f0; --text: #1e293b; --in: #10b981; --out: #ef4444; --save: #3b82f6; --cash: #f59e0b; --varie: #8b5cf6;
    }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; padding: 1rem 0.5rem; }
    .v-stack { display: flex; flex-direction: column; gap: 1rem; max-width: 700px; margin: 0 auto; }
    .card { background: var(--card-bg); border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 1.25rem; border: 1px solid var(--border); }
    .title { margin: 0; font-size: 1.2rem; color: var(--accent); text-align: center; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
    
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .stat { padding: 1rem; border-radius: 0.75rem; cursor: pointer; position: relative; border: 1px solid transparent; transition: all 0.2s; }
    .stat-label { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; opacity: 0.8; margin-bottom: 4px; }
    .stat-value { font-size: 1.1rem; font-weight: 800; }
    
    .bg-banca { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .bg-disp { background: #f5f3ff; color: #5b21b6; border: 1px solid #ddd6fe; }
    .bg-save { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
    .bg-cash { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
    .bg-varie { background: #faf5ff; color: #6b21a8; border: 2px dashed #d8b4fe; }

    .quick-actions { display: flex; gap: 4px; position: absolute; top: 8px; right: 8px; }
    .btn-small { background: white; border: 1px solid currentColor; font-weight: 700; padding: 2px 4px; font-size: 0.55rem; border-radius: 4px; cursor: pointer; }
    
    #alertBanner { padding: 0.8rem; border-radius: 0.75rem; font-weight: 700; text-align: center; font-size: 0.85rem; margin: 0.5rem 0; }
    .alert-ok { background: #dcfce7; color: #166534; }
    .alert-warn { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

    .section-title { margin: 1rem 0 0.8rem; font-size: 0.9rem; font-weight: 700; color: var(--accent); border-left: 4px solid var(--accent); padding-left: 8px; }
    input, select, button { border-radius: 0.6rem; border: 1px solid var(--border); padding: 0.7rem; font-size: 0.9rem; width: 100%; margin-bottom: 0.5rem; }
    button.primary { background: var(--accent); color: #fff; border: none; font-weight: 700; cursor: pointer; }
    
    .table { width: 100%; border-collapse: collapse; }
    .table td { padding: 0.75rem 0.5rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    .money.in { color: var(--in); font-weight: 700; }
    .money.out { color: var(--out); font-weight: 700; }
    
    .advice { font-size: 0.6rem; font-weight: 700; margin-top: 6px; line-height: 1.2; }
    .modal { display: none; position: fixed; z-index: 99; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
    .modal-content { background: white; padding: 1.5rem; border-radius: 1rem; width: 90%; max-height: 80vh; overflow-y: auto; }
  </style>
</head>
<body>

<div class="v-stack">
  <div class="card"><h1 class="title">Gestione Cashflow💵:<br>Risparmi per vacanze e tempo libero</h1></div>

  <div class="card">
    <div class="stats">
      <div class="stat bg-banca" onclick="showDetail('banca')">
        <div class="stat-label">HUB BANCA 💳</div>
        <div id="actBal" class="stat-value">0 €</div>
      </div>
      <div class="stat bg-disp" onclick="showDetail('disp')">
        <div class="stat-label">DISPONIBILE 🏁</div>
        <div id="curBal" class="stat-value">0 €</div>
      </div>
      <div class="stat bg-save" onclick="showDetail('save')">
        <div class="quick-actions">
          <button class="btn-small" onclick="event.stopPropagation(); manageFunds('save_in');">➕</button>
          <button class="btn-small" onclick="event.stopPropagation(); manageFunds('save_out');">🔙</button>
        </div>
        <div class="stat-label">RISPARMIO 💎</div>
        <div id="savBal" class="stat-value">0 €</div>
        <div class="advice">Obiettivo 20/mese: +200€</div>
      </div>
      <div class="stat bg-cash" onclick="showDetail('cash')">
        <button class="btn-small" style="position:absolute; top:8px; right:8px;" onclick="event.stopPropagation(); manageFunds('cash_in');">➕</button>
        <div class="stat-label">CONTANTE 💵</div>
        <div id="cashBal" class="stat-value">0 €</div>
      </div>
      <div class="stat bg-varie" style="grid-column: span 2;" onclick="showDetail('varie')">
        <div class="stat-label">PRUDENZA SHOPPING & SVAGO 🛍️</div>
        <div id="varieBal" class="stat-value">0 €</div>
        <div id="varieAdvice" class="advice"></div>
      </div>
    </div>
    <div id="alertBanner"></div>
  </div>

  <div class="card">
    <h2 class="section-title">PROIEZIONE SALDO (CUSCINETTO 800€)</h2>
    <canvas id="balanceChart" height="180"></canvas>
  </div>

  <div class="card">
    <h2 class="section-title">REGISTRA MOVIMENTO</h2>
    <form id="movForm">
      <input type="date" id="mDate" required>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <select id="mSource"><option value="banca">💳 Banca</option><option value="contanti">💵 Contanti</option></select>
        <select id="mType"><option value="uscita">Uscita (-)</option><option value="entrata">Entrata (+)</option></select>
      </div>
      <input type="number" id="mAmt" step="0.01" placeholder="Importo €" required>
      <input type="text" id="mCat" placeholder="Descrizione (Enel, Jeans, Spesa...)" required>
      <button type="submit" class="primary">REGISTRA OPERAZIONE</button>
    </form>
  </div>

  <div class="card">
    <h2 class="section-title">STORICO MOVIMENTI</h2>
    <table class="table"><tbody id="rows"></tbody></table>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:1rem">
      <button onclick="exportData()" style="background:#f1f5f9; color:#475569">Backup (Salva)</button>
      <button onclick="document.getElementById('importFile').click()" style="background:#f1f5f9; color:#475569">Importa (Carica)</button>
    </div>
    <input type="file" id="importFile" style="display:none" onchange="importData(event)">
  </div>
</div>

<div id="detailModal" class="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h3 id="modalTitle">Dettaglio</h3>
    <div id="modalBody"></div>
    <button onclick="closeModal()" style="margin-top:1rem">CHIUDI</button>
  </div>
</div>

<script>
  const fmt = n => new Intl.NumberFormat('it-IT', { style: 'currency', currency: 'EUR' }).format(n);
  const fmtDate = d => d.split('-').reverse().join('/');

  // Soglia alzata a 800€ come richiesto
  let state = { movs: [], buds: [], sBal: 0, stipendioBase: 3300, alertLimit: 800 };
  let chart;

  function loadData() {
    const saved = localStorage.getItem('bpm_v73');
    if (saved) state = JSON.parse(saved);
    // Assicuriamoci che la soglia sia 800 anche su vecchi caricamenti
    state.alertLimit = 800;
    render();
  }

  function getCalculatedData() {
    const today = new Date();
    const todayStr = today.toISOString().slice(0,10);
    const curMonth = todayStr.slice(0,7);
    
    const bancaBal = state.movs.filter(m => m.date <= todayStr && m.source === 'banca').reduce((s, m) => s + (m.type === 'entrata' ? m.amt : -m.amt), 0);
    const cashBal = state.movs.filter(m => m.source === 'contanti' && m.date <= todayStr).reduce((s, m) => s + (m.type === 'entrata' ? m.amt : -m.amt), 0);
    
    const risparmioFatto = state.movs.some(m => m.date.slice(0,7) === curMonth && (m.cat.includes("Risparmio Fisso") || m.cat.includes("Risparmio")));
    const prenotazioneRisparmio = (risparmioFatto || today.getDate() >= 20) ? 0 : 200;

    let fisseRes = 0;
    state.buds.forEach(f => {
      const pagata = state.movs.some(m => m.date.slice(0,7) === curMonth && m.cat.toLowerCase().includes(f.cat.toLowerCase()));
      if(!pagata) fisseRes += f.amt;
    });

    const avail = bancaBal + state.stipendioBase - fisseRes - prenotazioneRisparmio;
    // Budget shopping calcolato ora su soglia 800€
    const shoppingBudget = Math.max(0, avail - state.alertLimit);

    return { bancaBal, cashBal, avail, shoppingBudget, fisseRes };
  }

  function render() {
    const d = getCalculatedData();
    document.getElementById('actBal').textContent = fmt(d.bancaBal);
    document.getElementById('curBal').textContent = fmt(d.avail);
    document.getElementById('savBal').textContent = fmt(state.sBal);
    document.getElementById('cashBal').textContent = fmt(d.cashBal);
    document.getElementById('varieBal').textContent = fmt(d.shoppingBudget);

    const advice = document.getElementById('varieAdvice');
    if (d.avail < 1200) { // Prudenza maggiore se il margine totale è stretto
        advice.innerHTML = "⚠️ MASSIMA PRUDENZA<br>Margine ridotto per il cuscinetto di 800€";
        advice.style.color = "#b91c1c";
    } else {
        advice.innerHTML = "✅ SHOPPING POSSIBILE<br>Soglia sicurezza 800€ garantita";
        advice.style.color = "#15803d";
    }

    const banner = document.getElementById('alertBanner');
    if(d.avail < state.alertLimit) {
        banner.className = "alert-warn";
        banner.textContent = `🚨 DISPONIBILITÀ SOTTO SOGLIA SICUREZZA (800€): ${fmt(d.avail)}`;
    } else {
        banner.className = "alert-ok";
        banner.textContent = "✅ CUSCINETTO DI SICUREZZA OK";
    }

    const sorted = [...state.movs].sort((a,b) => new Date(b.date) - new Date(a.date));
    document.getElementById('rows').innerHTML = sorted.slice(0,10).map((m) => `
      <tr>
        <td><small>${fmtDate(m.date)}</small> ${m.source==='contanti'?'[CASH]':''}<br><b>${m.cat}</b></td>
        <td style="text-align:right" class="money ${m.type}">${m.type==='entrata'?'+':'-'}${fmt(m.amt)}</td>
        <td style="text-align:right"><button onclick="delM(${state.movs.indexOf(m)})" style="border:none; background:none; cursor:pointer">🗑️</button></td>
      </tr>`).join('');

    updateChart();
    localStorage.setItem('bpm_v73', JSON.stringify(state));
  }

  function updateChart() {
    const ctx = document.getElementById('balanceChart').getContext('2d');
    const sorted = [...state.movs].filter(m=>m.source=='banca').sort((a,b)=>new Date(a.date)-new Date(b.date));
    let rb = 0;
    const labels = sorted.map(m => fmtDate(m.date));
    const data = sorted.map(m => { rb += (m.type=='entrata'?m.amt:-m.amt); return rb; });

    if(chart) chart.destroy();
    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Saldo Reale', data: data, borderColor: '#01696f', tension: 0.3, fill: true, backgroundColor: 'rgba(1, 105, 92, 0.05)'
        }, {
          label: 'Soglia 800€', data: Array(labels.length).fill(800), borderColor: '#ef4444', borderDash: [5,5], pointRadius: 0
        }]
      },
      options: { responsive: true, plugins: { legend: { display: false } } }
    });
  }

  function manageFunds(action) {
    let amt = Number(prompt("Importo:")); if(!amt) return;
    const date = new Date().toISOString().slice(0,10);
    if(action==='save_in') { state.sBal += amt; state.movs.push({date, source:'banca', type:'uscita', amt, cat:"💎 Trasferimento Risparmio"}); }
    else if(action==='save_out') { state.sBal -= amt; state.movs.push({date, source:'banca', type:'entrata', amt, cat:"🔙 Revoca Risparmio"}); }
    else if(action==='cash_in') { 
        state.movs.push({ date, source:'banca', type:'uscita', amt, cat:"🏧 Prelievo Contante" });
        state.movs.push({ date, source:'contanti', type:'entrata', amt, cat:"💵 Carico Cassa" });
    }
    render();
  }

  document.getElementById('movForm').onsubmit = e => {
    e.preventDefault();
    state.movs.push({
      date: document.getElementById('mDate').value,
      source: document.getElementById('mSource').value,
      type: document.getElementById('mType').value,
      amt: Number(document.getElementById('mAmt').value),
      cat: document.getElementById('mCat').value
    });
    render(); e.target.reset();
  };

  function delM(i) { if(confirm("Eliminare?")) { state.movs.splice(i,1); render(); } }
  function closeModal() { document.getElementById('detailModal').style.display='none'; }
  function showDetail(t) {
    document.getElementById('modalTitle').innerText = t.toUpperCase();
    document.getElementById('detailModal').style.display='flex';
    const d = getCalculatedData();
    if(t=='varie') document.getElementById('modalBody').innerHTML = `Budget calcolato per svago mantenendo la tua soglia di sicurezza di ${fmt(state.alertLimit)} a fine mese.`;
    if(t=='cash') document.getElementById('modalBody').innerHTML = `Saldo attuale nel portafoglio (contante fisico).`;
  }
  function exportData() {
    const a = document.createElement('a'); a.href = 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(state));
    a.download = 'cashflow_v73.json'; a.click();
  }
  function importData(e) {
    const r = new FileReader(); r.onload = x => { state = JSON.parse(x.target.result); render(); };
    r.readAsText(e.target.files[0]);
  }

  loadData();
</script>
</body>
</html>
