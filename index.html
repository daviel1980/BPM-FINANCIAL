<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="CashflowVacanze">
  <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/96/beach-umbrella.png">
  <title>Cashflow Vacanze Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #f1f5f9; --card: #ffffff; --accent: #01696f; --accent-dark: #004d40;
      --border: #e2e8f0; --text: #1e293b; --in: #10b981; --out: #ef4444; --save: #3b82f6; --cash: #f59e0b; --varie: #ec4899;
    }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; padding: 0.5rem; }
    .container { max-width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 0.8rem; }
    
    /* Header */
    .header-card { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: white; padding: 1.2rem; border-radius: 1.2rem; text-align: center; box-shadow: 0 4px 15px rgba(1, 105, 111, 0.2); }
    .title { margin: 0; font-size: 0.85rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
    .btn-whatsapp { background: #25d366; color: white; border: none; padding: 8px 15px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; margin-top: 10px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

    /* Dashboard Grid */
    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.6rem; }
    .stat-card { background: var(--card); padding: 1rem; border-radius: 0.9rem; border: 1px solid var(--border); cursor: pointer; position: relative; }
    .stat-label { font-size: 0.55rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 4px; display: block; }
    .stat-value { font-size: 1.1rem; font-weight: 900; }
    
    /* Dynamic Status Colors */
    .status-ok { color: var(--in); }
    .status-warn { color: var(--cash); }
    .status-crit { color: var(--out); }

    /* Borders for cards */
    .border-banca { border-left: 5px solid var(--in); }
    .border-disp { border-left: 5px solid #8b5cf6; }
    .border-save { border-left: 5px solid var(--save); }
    .border-cash { border-left: 5px solid var(--cash); }
    .border-tempo { border-left: 5px solid var(--varie); grid-column: span 2; }

    .quick-actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 4px; }
    .btn-mini { background: #f1f5f9; border: 1px solid var(--border); padding: 2px 5px; border-radius: 4px; font-size: 0.6rem; cursor: pointer; }

    /* Forms and Lists */
    .card { background: var(--card); padding: 1.2rem; border-radius: 1.1rem; border: 1px solid var(--border); }
    .section-title { margin: 0 0 1rem 0; font-size: 0.75rem; font-weight: 800; color: var(--accent); text-transform: uppercase; border-left: 4px solid var(--accent); padding-left: 10px; }

    input, select, button { border-radius: 0.7rem; border: 1px solid var(--border); padding: 0.8rem; font-size: 0.95rem; width: 100%; margin-bottom: 0.6rem; box-sizing: border-box; }
    button.primary { background: var(--accent); color: white; border: none; font-weight: 800; cursor: pointer; }
    
    .table { width: 100%; border-collapse: collapse; }
    .table td { padding: 0.8rem 0.2rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    
    /* Movement specific colors */
    .entrata { color: var(--in) !important; font-weight: 800; }
    .uscita { color: var(--out) !important; font-weight: 800; }

    /* Modal Styling */
    .modal { display: none; position: fixed; z-index: 9999; left:0; top:0; width:100%; height:100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; backdrop-filter: blur(5px); }
    .modal-content { background: white; padding: 1.5rem; border-radius: 1.5rem; width: 88%; max-height: 80vh; overflow-y: auto; position: relative; }
    .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    .detail-header { color: var(--accent); margin-top: 0; border-bottom: 2px solid var(--accent); padding-bottom: 5px; margin-bottom: 15px; }
  </style>
</head>
<body>

<div class="container">
    <div class="header-card">
        <h1 class="title">Cashflow Vacanze Pro</h1>
        <button onclick="sendWhatsAppReport()" class="btn-whatsapp">📲 INVIA REPORT WHATSAPP</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card border-banca" onclick="showDetail('banca')">
            <span class="stat-label">SALDO REALE 💳</span>
            <div id="actBal" class="stat-value">0 €</div>
        </div>

        <div class="stat-card border-disp" onclick="showDetail('gap')">
            <span class="stat-label">DISPONIBILE (GAP) 🏁</span>
            <div id="curBal" class="stat-value">0 €</div>
        </div>

        <div class="stat-card border-save" onclick="showDetail('risparmio')">
            <div class="quick-actions"><span class="btn-mini" onclick="event.stopPropagation(); editManualBalance('save')">✏️</span></div>
            <span class="stat-label">RISPARMIO 💎</span>
            <div id="savBal" class="stat-value">0 €</div>
        </div>

        <div class="stat-card border-cash" onclick="showDetail('cassa')">
            <div class="quick-actions">
                <span class="btn-mini" onclick="event.stopPropagation(); editManualBalance('cash')">✏️</span>
                <span class="btn-mini" onclick="event.stopPropagation(); manageFunds('cash_in')">➕</span>
            </div>
            <span class="stat-label">CONTANTE 💵</span>
            <div id="cashBal" class="stat-value">0 €</div>
        </div>

        <div class="stat-card border-tempo" onclick="showDetail('tempo')">
            <span class="stat-label">TARGET TEMPO LIBERO (500€) 🛍️</span>
            <div id="tempoBal" class="stat-value">0 €</div>
        </div>
    </div>

    <div class="card"><h2 class="section-title">Andamento Mensile</h2><canvas id="balanceChart" height="150"></canvas></div>

    <div class="card">
        <h2 class="section-title">Nuova Registrazione</h2>
        <form id="movForm">
            <input type="date" id="mDate" required>
            <div style="display:flex; gap:8px">
                <select id="mSource"><option value="banca">💳 Banca</option><option value="contanti">💵 Cassa</option></select>
                <select id="mType"><option value="uscita">Uscita</option><option value="entrata">Entrata</option></select>
            </div>
            <select id="mTag">
                <option value="ordinaria">Ordinaria</option>
                <option value="svago">🛍️ Svago / Shopping</option>
                <option value="stipendio">💰 Stipendio</option>
                <option value="inps">🏛️ INPS</option>
            </select>
            <input type="number" id="mAmt" step="0.01" placeholder="Importo €" required>
            <input type="text" id="mCat" placeholder="Descrizione" required>
            <button type="submit" class="primary">SALVA MOVIMENTO</button>
        </form>
    </div>

    <div class="card">
        <h2 class="section-title">Storico Recente</h2>
        <table class="table"><tbody id="rows"></tbody></table>
        <div style="display:flex; justify-content: space-between; margin-top:15px;">
            <button onclick="exportData()" style="width:auto; padding:5px 10px; font-size:0.7rem;">ESPORTA BACKUP</button>
            <button onclick="clearHistory()" style="width:auto; padding:5px 10px; font-size:0.7rem; background:var(--out); color:white; border:none;">SVUOTA TUTTO</button>
        </div>
    </div>
</div>

<div id="detailModal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="modalTitle" class="detail-header"></h3>
        <div id="modalBody"></div>
        <button onclick="closeModal()" class="primary" style="margin-top:1.5rem;">CHIUDI</button>
    </div>
</div>

<script>
    const fmt = n => new Intl.NumberFormat('it-IT', { style: 'currency', currency: 'EUR' }).format(n || 0);
    let state = { movs: [], sBal: 0, cashManual: null, lastSyncDate: null, lastSyncId: null };
    let chart;

    function loadData() {
        const saved = localStorage.getItem('cashflow_master_data');
        if (saved) state = JSON.parse(saved);
        document.getElementById('mDate').valueAsDate = new Date();
        render();
    }

    function getCalculatedData() {
        const todayStr = new Date().toISOString().split('T')[0];
        const curMonth = todayStr.slice(0, 7);

        const bancaBal = state.movs
            .filter(m => m.source === 'banca' && m.date <= todayStr)
            .reduce((s, m) => s + (m.type === 'entrata' ? Number(m.amt) : -Number(m.amt)), 0);
        
        let cashBal = 0;
        if (state.cashManual !== null) {
            cashBal = state.cashManual;
            state.movs.filter(m => m.source === 'contanti' && (m.date > state.lastSyncDate || (m.date === state.lastSyncDate && m.id > state.lastSyncId))).forEach(m => {
                cashBal += (m.type === 'entrata' ? Number(m.amt) : -Number(m.amt));
            });
        } else {
            cashBal = state.movs.filter(m => m.source === 'contanti' && m.date <= todayStr).reduce((s, m) => s + (m.type === 'entrata' ? Number(m.amt) : -Number(m.amt)), 0);
        }

        const spesoSvago = state.movs
            .filter(m => m.date.slice(0, 7) === curMonth && (m.tag === 'svago' || m.cat.toLowerCase().includes('svago')))
            .reduce((s, m) => s + Number(m.amt), 0);

        return { bancaBal, cashBal, residuoSvago: Math.max(0, 500 - spesoSvago) };
    }

    function render() {
        const d = getCalculatedData();
        const curBalEl = document.getElementById('curBal');
        
        document.getElementById('actBal').textContent = fmt(d.bancaBal);
        document.getElementById('savBal').textContent = fmt(state.sBal);
        document.getElementById('cashBal').textContent = fmt(d.cashBal);
        document.getElementById('tempoBal').textContent = fmt(d.residuoSvago);
        
        curBalEl.textContent = fmt(d.bancaBal); 
        curBalEl.className = 'stat-value ' + (d.bancaBal > 1000 ? 'status-ok' : d.bancaBal > 800 ? 'status-warn' : 'status-crit');

        const rowsHTML = state.movs.slice().reverse().slice(0,10).map((m) => `
            <tr>
                <td><b>${m.cat}</b><br><small>${m.date} (${m.source == 'banca' ? '💳' : '💵'})</small></td>
                <td class="${m.type}" style="text-align:right">${m.type == 'entrata' ? '+' : '-'}${fmt(m.amt)}</td>
                <td style="text-align:right"><button onclick="deleteMov(${state.movs.indexOf(m)})" style="background:none; border:none; font-size:1rem;">🗑️</button></td>
            </tr>
        `).join('');
        document.getElementById('rows').innerHTML = rowsHTML || '<tr><td colspan="3" style="text-align:center">Nessun movimento</td></tr>';
        
        localStorage.setItem('cashflow_master_data', JSON.stringify(state));
        updateChart();
    }

    function showDetail(type) {
        const todayStr = new Date().toISOString().split('T')[0];
        const curMonth = todayStr.slice(0, 7);
        let title = "", list = [];
        
        if(type === 'banca') {
            title = "Dettaglio Banca 💳";
            list = state.movs.filter(m => m.source === 'banca').reverse();
        } else if(type === 'cassa') {
            title = "Dettaglio Contanti 💵";
            // Per la cassa mostriamo i movimenti influenti
            list = state.movs.filter(m => m.source === 'contanti').reverse();
        } else if(type === 'risparmio') {
            title = "Dettaglio Risparmi 💎";
            list = state.movs.filter(m => m.cat.includes("Risparmio")).reverse();
        } else if(type === 'tempo') {
            title = "Spese Svago del Mese 🛍️";
            list = state.movs.filter(m => m.date.slice(0,7) === curMonth && (m.tag === 'svago' || m.cat.toLowerCase().includes('svago'))).reverse();
        } else {
            title = "Riepilogo Recente 🏁";
            list = state.movs.slice(-15).reverse();
        }

        const bodyHTML = list.length ? list.map(m => `
            <div class="detail-row">
                <span><small>${m.date}</small><br><b>${m.cat}</b></span>
                <span class="${m.type}">${m.type === 'entrata' ? '+' : '-'}${fmt(m.amt)}</span>
            </div>
        `).join('') : '<div style="padding:20px; text-align:center;">Nessun dato registrato</div>';

        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalBody').innerHTML = bodyHTML;
        document.getElementById('detailModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('detailModal').style.display = 'none'; }

    document.getElementById('movForm').onsubmit = e => {
        e.preventDefault();
        state.movs.push({
            id: Date.now(),
            date: document.getElementById('mDate').value,
            source: document.getElementById('mSource').value == 'banca' ? 'banca' : 'contanti',
            type: document.getElementById('mType').value,
            tag: document.getElementById('mTag').value,
            amt: Number(document.getElementById('mAmt').value),
            cat: document.getElementById('mCat').value
        });
        render(); e.target.reset(); document.getElementById('mDate').valueAsDate = new Date();
    };

    function editManualBalance(type) {
        const val = prompt("Inserisci il saldo attuale esatto:");
        if (val === null || val === "") return;
        const num = parseFloat(val.replace(',', '.'));
        if (type === 'save') {
            state.sBal = num;
        } else {
            state.cashManual = num;
            state.lastSyncDate = new Date().toISOString().split('T')[0];
            state.lastSyncId = Date.now();
        }
        render();
    }

    function manageFunds(action) {
        if(action === 'cash_in') {
            const amt = prompt("Importo prelevato dalla banca:");
            if (!amt) return;
            const num = parseFloat(amt.replace(',', '.'));
            const d = new Date().toISOString().split('T')[0];
            const tid = Date.now();
            state.movs.push({ id: tid, date: d, source: 'banca', type: 'uscita', amt: num, cat: "🏧 Prelievo", tag: "ordinaria" });
            state.movs.push({ id: tid + 1, date: d, source: 'contanti', type: 'entrata', amt: num, cat: "💵 Carico Cassa", tag: "ordinaria" });
            render();
        }
    }

    function deleteMov(i) { if(confirm("Eliminare questa riga?")) { state.movs.splice(i,1); render(); } }
    function clearHistory() { if(confirm("⚠️ SVUOTARE TUTTO LO STORICO?")) { state.movs = []; state.cashManual = null; render(); } }
    
    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
        const dl = document.createElement('a');
        dl.setAttribute("href", dataStr);
        dl.setAttribute("download", "cashflow_backup.json");
        dl.click();
    }

    function updateChart() {
        const ctx = document.getElementById('balanceChart').getContext('2d');
        if (chart) chart.destroy();
        const last7 = state.movs.slice(-7);
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: last7.map(m => m.date.slice(5)),
                datasets: [{ 
                    data: last7.map(m => m.type === 'entrata' ? m.amt : -m.amt), 
                    borderColor: '#01696f', 
                    tension: 0.3,
                    fill: true,
                    backgroundColor: 'rgba(1, 105, 92, 0.1)'
                }]
            },
            options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
        });
    }

    function sendWhatsAppReport() {
        const d = getCalculatedData();
        const msg = encodeURIComponent(`*📊 REPORT CASHFLOW*\n\n💳 *Saldo Reale:* ${fmt(d.bancaBal)}\n💵 *Contante:* ${fmt(d.cashBal)}\n💎 *Risparmio:* ${fmt(state.sBal)}\n🛍️ *Budget Svago:* ${fmt(d.residuoSvago)}`);
        window.open(`https://wa.me/?text=${msg}`, '_blank');
    }

    loadData();
</script>
</body>
</html>
