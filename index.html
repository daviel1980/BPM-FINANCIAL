<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/96/beach-umbrella.png">
    <title>Cashflow Davide & Antonella v131</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #f1f5f9; --card: #ffffff; --accent: #01696f; --accent-dark: #004d40;
            --border: #e2e8f0; --text: #1e293b; --in: #10b981; --out: #ef4444; --save: #3b82f6; --cash: #f59e0b; --varie: #ec4899; --wa: #25d366;
        }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; padding: 0.5rem; }
        .container { max-width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 0.8rem; }
        
        /* Banner Logic */
        .banner { display: none; padding: 1rem; border-radius: 0.8rem; font-weight: 800; font-size: 0.8rem; text-align: center; border: 2px solid; animation: pulse 2s infinite; margin-bottom: 0.5rem; }
        .banner-red { display: block !important; background: #fee2e2; border-color: #ef4444; color: #991b1b; }
        .banner-yellow { display: block !important; background: #fef9c3; border-color: #facc15; color: #854d0e; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }

        .header-card { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: white; padding: 1.2rem; border-radius: 1.2rem; text-align: center; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
        .stat-card { background: var(--card); padding: 1rem; border-radius: 0.9rem; border: 1px solid var(--border); position: relative; cursor: pointer; }
        .stat-label { font-size: 0.55rem; font-weight: 800; color: #64748b; text-transform: uppercase; display: block; margin-bottom: 4px; }
        .stat-value { font-size: 1.1rem; font-weight: 900; }
        
        .btn-wa { background: var(--wa); color: white; border: none; padding: 0.9rem; border-radius: 0.8rem; font-weight: 800; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2); }
        .card { background: var(--card); padding: 1.2rem; border-radius: 1.1rem; border: 1px solid var(--border); }
        .section-title { font-size: 0.75rem; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 1rem; border-left: 4px solid var(--accent); padding-left: 10px; }

        input, select, button { border-radius: 0.7rem; border: 1px solid var(--border); padding: 0.8rem; font-size: 0.95rem; width: 100%; margin-bottom: 0.6rem; box-sizing: border-box; }
        button.primary { background: var(--accent); color: white; font-weight: 800; border: none; }
        
        .table { width: 100%; border-collapse: collapse; }
        .table td { padding: 0.8rem 0.2rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .btn-icon { background: none; border: none; cursor: pointer; font-size: 1.1rem; padding: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div id="dynamicBanner" class="banner"></div>

    <div class="header-card">
        <h1 style="margin:0; font-size:0.9rem; text-transform:uppercase;">Cashflow Davide & Antonella</h1>
    </div>

    <div class="stats-grid">
        <div class="stat-card" style="border-left: 5px solid var(--in);" onclick="showModal('banca')">
            <span class="stat-label">Saldo Reale 💳</span><div id="actBal" class="stat-value">0 €</div>
        </div>
        <div class="stat-card" style="border-left: 5px solid #8b5cf6;" onclick="showModal('gap')">
            <span class="stat-label">Disponibile 🏁</span><div id="curBal" class="stat-value">0 €</div>
        </div>
        <div class="stat-card" style="border-left: 5px solid var(--save);">
            <button class="btn-icon" style="position:absolute; top:5px; right:5px" onclick="event.stopPropagation(); editManual('save')">✏️</button>
            <span class="stat-label">Risparmio 💎</span><div id="savBal" class="stat-value">0 €</div>
        </div>
        <div class="stat-card" style="border-left: 5px solid var(--cash);">
            <button class="btn-icon" style="position:absolute; top:5px; right:5px" onclick="event.stopPropagation(); editManual('cash')">✏️</button>
            <span class="stat-label">Contante 💵</span><div id="cashBal" class="stat-value">0 €</div>
        </div>
        <div class="stat-card" style="grid-column: span 2; border-left: 5px solid var(--varie); background: #fff1f2;" onclick="showModal('tempo')">
            <span class="stat-label">Target Tempo Libero (500€) 🛍️</span><div id="tempoBal" class="stat-value">0 €</div>
        </div>
    </div>

    <button class="btn-wa" onclick="sendWA()">Invia Report ad Antonella 🏖️</button>

    <div class="card"><canvas id="balanceChart" height="150"></canvas></div>

    <div class="card">
        <div class="section-title">Spese Fisse</div>
        <div id="budList"></div>
        <button class="primary" onclick="addFissa()" style="margin-top:10px">+ Aggiungi Fissa</button>
    </div>

    <div class="card">
        <div class="section-title">Nuova Registrazione</div>
        <form id="movForm">
            <input type="date" id="mDate" required>
            <div style="display:flex; gap:8px">
                <select id="mSource"><option value="banca">💳 Banca</option><option value="cash">💵 Cassa</option></select>
                <select id="mType"><option value="uscita">Uscita</option><option value="entrata">Entrata</option></select>
            </div>
            <select id="mTag">
                <option value="ordinaria">Ordinaria</option>
                <option value="stipendio">💰 Stipendio</option>
                <option value="svago">🛍️ Svago/Shopping</option>
            </select>
            <input type="number" id="mAmt" step="0.01" placeholder="Importo €" required>
            <input type="text" id="mDesc" placeholder="Descrizione" required>
            <button type="submit" class="primary">SALVA</button>
        </form>
    </div>

    <div class="card">
        <div class="section-title">Storico</div>
        <table class="table"><tbody id="rows"></tbody></table>
        <div style="display:flex; gap:8px; margin-top:15px">
            <button onclick="exportJSON()" style="font-size:0.7rem">Backup</button>
            <button onclick="document.getElementById('imp').click()" style="font-size:0.7rem">Importa</button>
            <input type="file" id="imp" style="display:none" onchange="importJSON(event)">
        </div>
    </div>
</div>

<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; align-items:center; justify-content:center;" onclick="this.style.display='none'">
    <div class="card" style="width:85%; max-height:80%; overflow-y:auto;" onclick="event.stopPropagation()">
        <h3 id="modTitle" style="margin-top:0; color:var(--accent)"></h3>
        <div id="modBody" style="font-size:0.9rem; line-height:1.5"></div>
        <button class="primary" style="margin-top:15px" onclick="document.getElementById('modal').style.display='none'">Chiudi</button>
    </div>
</div>

<script>
    const fmt = n => new Intl.NumberFormat('it-IT', { style: 'currency', currency: 'EUR' }).format(n || 0);
    let state = { movs: [], fisse: [], sBal: 0, cMan: null };
    let chart;

    function init() {
        const saved = localStorage.getItem('cashflow_master_v131');
        if (saved) state = JSON.parse(saved);
        document.getElementById('mDate').valueAsDate = new Date();
        render();
    }

    function calculate() {
        const today = new Date().toISOString().split('T')[0];
        const curMonth = today.slice(0, 7);
        const lastDay = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).getDate();

        const bancaBal = state.movs.filter(m => m.source === 'banca' && m.date <= today)
            .reduce((s, m) => s + (m.type === 'entrata' ? Number(m.amt) : -Number(m.amt)), 0);

        const cashBal = (state.cMan !== null) ? state.cMan : state.movs.filter(m => m.source === 'cash' && m.date <= today)
            .reduce((s, m) => s + (m.type === 'entrata' ? Number(m.amt) : -Number(m.amt)), 0);

        const spesoTempo = state.movs.filter(m => m.date.slice(0,7) === curMonth && m.mTag === 'svago')
            .reduce((s, m) => s + Number(m.amt), 0);

        let running = bancaBal;
        let details = [];
        for (let d = new Date().getDate(); d <= lastDay; d++) {
            const dStr = curMonth + "-" + String(d).padStart(2, '0');
            if (d === 15 && !state.movs.some(m => m.date.slice(0,7) === curMonth && m.date.endsWith('-15') && m.mTag === 'stipendio')) { running += 1650; details.push("Stipendio 15: +1650€"); }
            if (d === lastDay && !state.movs.some(m => m.date.slice(0,7) === curMonth && Number(m.date.split('-')[2]) > 27 && m.mTag === 'stipendio')) { running += 1650; details.push("Stipendio 30: +1650€"); }
            state.fisse.forEach(f => {
                if (Number(f.day) === d && !state.movs.some(m => m.date.slice(0,7) === curMonth && m.desc.toLowerCase().includes(f.name.toLowerCase()))) {
                    running -= Number(f.amt); details.push(`${f.name}: -${f.amt}€`);
                }
            });
            state.movs.filter(m => m.date === dStr && m.date > today && m.source === 'banca').forEach(m => {
                const v = m.type === 'entrata' ? Number(m.amt) : -Number(m.amt);
                running += v; details.push(`${m.desc}: ${v > 0 ? '+':''}${v}€`);
            });
        }
        return { bancaBal, cashBal, avail: running, details, spesoTempo, residuoTempo: 500 - spesoTempo };
    }

    function render() {
        const d = calculate();
        const banner = document.getElementById('dynamicBanner');
        if (d.avail < 800) { banner.className = "banner banner-red"; banner.innerHTML = `🚨 ALERT: Saldo fine mese previsto a ${fmt(d.avail)}!`; }
        else if (new Date().getDay() === 4) { banner.className = "banner banner-yellow"; banner.innerHTML = "📅 Giovedì: Aggiorna il saldo con Antonella!"; }
        else { banner.className = "banner"; }

        document.getElementById('actBal').innerText = fmt(d.bancaBal);
        document.getElementById('curBal').innerText = fmt(d.avail);
        document.getElementById('savBal').innerText = fmt(state.sBal);
        document.getElementById('cashBal').innerText = fmt(d.cashBal);
        document.getElementById('tempoBal').innerText = fmt(d.residuoTempo);

        document.getElementById('budList').innerHTML = state.fisse.map((f, i) => `
            <div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:0.8rem">
                <span>${f.name} (gg ${f.day})</span>
                <span><b>${fmt(f.amt)}</b> <button class="btn-icon" onclick="delFissa(${i})">🗑️</button></span>
            </div>`).join('');

        document.getElementById('rows').innerHTML = state.movs.slice().reverse().slice(0,10).map((m, i) => {
            const realIdx = state.movs.length - 1 - i;
            return `<tr>
                <td><small>${m.date.split('-').reverse().slice(0,2).join('/')}</small><br><b>${m.desc}</b></td>
                <td style="text-align:right; color:${m.type==='entrata'?'green':'red'}"><b>${m.type==='entrata'?'+':'-'}${fmt(m.amt)}</b></td>
                <td style="text-align:right">
                    <button class="btn-icon" onclick="editMov(${realIdx})">✏️</button>
                    <button class="btn-icon" onclick="delMov(${realIdx})">🗑️</button>
                </td>
            </tr>`;
        }).join('');

        updateChart(d.avail);
        localStorage.setItem('cashflow_master_v131', JSON.stringify(state));
    }

    function updateChart(avail) {
        const ctx = document.getElementById('balanceChart').getContext('2d');
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: ['Oggi', 'Fine Mese'], datasets: [{ label: 'Saldo', data: [calculate().bancaBal, avail], borderColor: '#01696f', tension: 0.3 }, { label: 'Limite', data: [800, 800], borderColor: 'red', borderDash: [5,5], pointRadius: 0 }] },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });
    }

    document.getElementById('movForm').onsubmit = e => {
        e.preventDefault();
        state.movs.push({
            date: document.getElementById('mDate').value,
            source: document.getElementById('mSource').value,
            type: document.getElementById('mType').value,
            mTag: document.getElementById('mTag').value,
            amt: Number(document.getElementById('mAmt').value),
            desc: document.getElementById('mDesc').value
        });
        render(); e.target.reset(); document.getElementById('mDate').valueAsDate = new Date();
    };

    function addFissa() {
        const name = prompt("Nome:"); const amt = prompt("Importo €:"); const day = prompt("Giorno (1-31):");
        if (name && amt && day) { state.fisse.push({name, amt, day}); render(); }
    }

    function editManual(type) {
        const val = prompt("Inserisci valore €:");
        if (val !== null) {
            if (type === 'save') state.sBal = Number(val);
            else state.cMan = Number(val);
            render();
        }
    }

    function editMov(i) {
        const m = state.movs[i];
        const nD = prompt("Descrizione:", m.desc); const nA = prompt("Importo €:", m.amt);
        if (nD && nA) { m.desc = nD; m.amt = Number(nA); render(); }
    }

    function showModal(type) {
        const d = calculate(); const m = document.getElementById('modal');
        if (type==='gap') { document.getElementById('modTitle').innerText = "Dettaglio Fine Mese"; document.getElementById('modBody').innerHTML = d.details.join('<br>'); }
        if (type==='tempo') { document.getElementById('modTitle').innerText = "Target Tempo Libero"; document.getElementById('modBody').innerHTML = `Budget: 500€<br>Speso: ${fmt(d.spesoTempo)}<br>Residuo: <b>${fmt(d.residuoTempo)}</b>`; }
        m.style.display = 'flex';
    }

    function sendWA() {
        const d = calculate();
        const msg = `🏖️ *REPORT CASHFLOW*\n\n💳 Reale: ${fmt(d.bancaBal)}\n🏁 Previsto: ${fmt(d.avail)}\n💎 Risparmio: ${fmt(state.sBal)}\n🛍️ Tempo Libero: ${fmt(d.residuoTempo)}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
    }

    function delMov(i) { if(confirm("Eliminare?")) { state.movs.splice(i,1); render(); } }
    function delFissa(i) { if(confirm("Eliminare?")) { state.fisse.splice(i,1); render(); } }
    function exportJSON() { const b = new Blob([JSON.stringify(state)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'cashflow_backup.json'; a.click(); }
    function importJSON(e) { const r = new FileReader(); r.onload = x => { state = JSON.parse(x.target.result); render(); }; r.readAsText(e.target.files[0]); }

    init();
</script>
</body>
</html>
